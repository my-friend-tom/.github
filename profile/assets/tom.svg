<svg xmlns="http://www.w3.org/2000/svg" width="300" height="250" viewBox="0 0 300 250" font-family="Verdana, sans-serif">
  <!-- b/w webcam-era office photo homage -->
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8e8e8"/><stop offset="1" stop-color="#c9c9c9"/>
    </linearGradient>
  </defs>
  <rect width="300" height="250" fill="url(#wall)"/>
  <!-- whiteboard behind -->
  <rect x="20" y="18" width="180" height="90" fill="#fbfbfb" stroke="#9a9a9a"/>
  <g stroke="#8a8a8a" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M32 40 h120"/><path d="M32 55 h90"/><path d="M32 70 h140"/><path d="M32 85 h70"/>
  </g>
  <!-- desk -->
  <rect x="0" y="210" width="300" height="40" fill="#7a7a7a"/>
  <!-- CRT monitor edge -->
  <rect x="205" y="120" width="95" height="95" rx="6" fill="#4a4a4a"/>
  <rect x="215" y="130" width="75" height="65" fill="#8fb7e0"/>
  <!-- chair back -->
  <rect x="60" y="150" width="150" height="100" rx="14" fill="#5f5f5f"/>
  <!-- Tom: white tee, turned over shoulder -->
  <path d="M85 250 q0 -70 65 -78 q65 8 65 78 z" fill="#f4f4f4" stroke="#cfcfcf"/>
  <!-- head turned -->
  <circle cx="150" cy="120" r="34" fill="#d9c3a5"/>
  <path d="M118 108 q32 -30 64 0 q-4 -34 -32 -34 q-28 0 -32 34 z" fill="#3a2f26"/>
  <!-- smile -->
  <path d="M138 132 q12 12 24 0" stroke="#5a4636" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="139" cy="118" r="3" fill="#3a2f26"/><circle cx="161" cy="118" r="3" fill="#3a2f26"/>
  <!-- caption bar -->
  <rect x="0" y="0" width="300" height="0" />
  <text x="10" y="242" font-size="12" fill="#ffffff" font-weight="bold">Tom · Thanks for the add! :)</text>
</svg>
