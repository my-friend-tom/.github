<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="1080" viewBox="0 0 1140 1080" font-family="Verdana, Tahoma, Geneva, sans-serif">
  <defs>
    <linearGradient id="nav" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#84acdb"/><stop offset="0.5" stop-color="#5f8fca"/><stop offset="1" stop-color="#4f80c0"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7ba7d7"/><stop offset="0.5" stop-color="#5b8fce"/><stop offset="1" stop-color="#4a7ec0"/>
    </linearGradient>
  </defs>

  <!-- page bg -->
  <rect width="1140" height="1080" fill="#ffffff"/>

  <!-- ===== TOP NAV BAR ===== -->
  <rect x="0" y="0" width="1140" height="30" fill="url(#nav)"/>
  <rect x="0" y="0" width="1140" height="1" fill="#a9c6e6"/>
  <text x="24" y="20" font-size="12.5" fill="#ffffff" font-weight="bold" letter-spacing="0.2">Home <tspan fill="#c9dcf1" font-weight="normal">|</tspan> Browse <tspan fill="#c9dcf1" font-weight="normal">|</tspan> Search <tspan fill="#c9dcf1" font-weight="normal">|</tspan> Invite <tspan fill="#c9dcf1" font-weight="normal">|</tspan> Film <tspan fill="#c9dcf1" font-weight="normal">|</tspan> Mail <tspan fill="#c9dcf1" font-weight="normal">|</tspan> Blog <tspan fill="#c9dcf1" font-weight="normal">|</tspan> Favorites <tspan fill="#c9dcf1" font-weight="normal">|</tspan> Forum <tspan fill="#c9dcf1" font-weight="normal">|</tspan> Groups <tspan fill="#c9dcf1" font-weight="normal">|</tspan> Events <tspan fill="#c9dcf1" font-weight="normal">|</tspan> Videos <tspan fill="#c9dcf1" font-weight="normal">|</tspan> Music <tspan fill="#c9dcf1" font-weight="normal">|</tspan> Classifieds</text>

  <!-- ============================================================ -->
  <!-- ===================== LEFT COLUMN ========================== -->
  <!-- ============================================================ -->

  <!-- name -->
  <text x="34" y="72" font-size="21" font-weight="bold" fill="#222">Tom</text>

  <!-- profile photo (grayscale homage) -->
  <g>
    <rect x="34" y="84" width="246" height="212" fill="#c9ccc7" stroke="#8f938c"/>
    <clipPath id="pc"><rect x="34" y="84" width="246" height="212"/></clipPath>
    <g clip-path="url(#pc)">
      <rect x="34" y="84" width="246" height="212" fill="#b7bcb4"/>
      <!-- whiteboard -->
      <rect x="34" y="84" width="150" height="150" fill="#dfe2dc"/>
      <g stroke="#9aa09a" stroke-width="2" fill="none" stroke-linecap="round">
        <path d="M50 120 h95"/><path d="M50 138 h70"/><path d="M50 156 h110"/><path d="M50 174 h55"/>
      </g>
      <!-- shoulders / white shirt -->
      <path d="M70 296 q10 -80 90 -92 q88 8 100 92 z" fill="#eef0ec" stroke="#cdd0c9"/>
      <!-- head turned over shoulder -->
      <ellipse cx="150" cy="180" rx="46" ry="52" fill="#b39a7d"/>
      <path d="M104 168 q46 -46 92 -4 q2 -50 -46 -52 q-44 2 -46 56 z" fill="#3b2f26"/>
      <path d="M112 176 q6 -10 16 -8" stroke="#2e241c" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M172 176 q10 -2 16 8" stroke="#2e241c" stroke-width="3" fill="none" stroke-linecap="round"/>
      <ellipse cx="130" cy="182" rx="4" ry="5" fill="#241c15"/><ellipse cx="170" cy="182" rx="4" ry="5" fill="#241c15"/>
      <path d="M126 206 q24 20 48 0" stroke="#6a5140" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- stats to the right of photo -->
  <text x="300" y="98" font-size="14" fill="#333" font-weight="bold">"; -)"</text>
  <g font-size="12.5" fill="#333">
    <text x="300" y="136">Male</text>
    <text x="300" y="154">30 years old</text>
    <text x="300" y="172">Santa Monica,</text>
    <text x="300" y="190">CALIFORNIA</text>
    <text x="300" y="208">United States</text>
  </g>
  <!-- online now -->
  <circle cx="306" cy="246" r="6" fill="#e8791a"/><circle cx="306" cy="246" r="6" fill="none" stroke="#b85e10"/>
  <text x="320" y="251" font-size="12.5" font-weight="bold" fill="#cc6600">Online Now!</text>
  <g font-size="12.5" fill="#333">
    <text x="300" y="284">Last Login:</text>
    <text x="300" y="300">5/9/2006</text>
  </g>

  <!-- View My -->
  <text x="34" y="326" font-size="12.5" fill="#333">View My: <tspan fill="#003399" font-weight="bold">Pics</tspan> <tspan fill="#666">|</tspan> <tspan fill="#003399" font-weight="bold">Videos</tspan></text>

  <!-- ===== Contacting Tom box ===== -->
  <g>
    <rect x="34" y="348" width="432" height="182" fill="#ffffff" stroke="#6699cc" stroke-width="1"/>
    <rect x="35" y="349" width="430" height="22" fill="url(#hdr)"/>
    <text x="46" y="365" font-size="12.5" font-weight="bold" fill="#ffffff">Contacting Tom</text>
    <g font-size="12.5" fill="#003399" font-weight="bold">
      <!-- left col -->
      <rect x="58" y="392" width="14" height="11" fill="#e8b84b" stroke="#a9812a"/><text x="82" y="402">Send Message</text>
      <rect x="58" y="426" width="14" height="11" fill="#8fae5b" stroke="#5f7a35"/><text x="82" y="436">Add to Friends</text>
      <rect x="58" y="460" width="14" height="11" fill="#7f9dc9" stroke="#4f6ea3"/><text x="82" y="470">Instant Message</text>
      <rect x="58" y="494" width="14" height="11" fill="#6ab04f" stroke="#3f7a2f"/><text x="82" y="504">Add to Group</text>
      <!-- right col -->
      <rect x="268" y="392" width="14" height="11" fill="#d98a3a" stroke="#a45f1e"/><text x="292" y="402">Forward to Friend</text>
      <rect x="268" y="426" width="14" height="11" fill="#e0a53a" stroke="#a97a1e"/><text x="292" y="436">Add to Favorites</text>
      <rect x="268" y="460" width="14" height="11" fill="#5f5f5f" stroke="#333"/><text x="292" y="470">Block User</text>
      <rect x="268" y="494" width="14" height="11" fill="#b06fae" stroke="#7a4278"/><text x="292" y="504">Rank User</text>
    </g>
  </g>

  <!-- ===== MySpace URL box ===== -->
  <g>
    <rect x="34" y="600" width="432" height="52" fill="#ffffff" stroke="#6699cc"/>
    <text x="44" y="620" font-size="12.5" font-weight="bold" fill="#333">MySpace URL:</text>
    <rect x="44" y="628" width="412" height="18" fill="#f2f6fb" stroke="#c4d4e8"/>
    <text x="50" y="641" font-size="12" fill="#333">http://github.com/my-friend-tom</text>
  </g>

  <!-- ===== Tom's Interests box ===== -->
  <g>
    <rect x="34" y="672" width="432" height="252" fill="#ffffff" stroke="#6699cc"/>
    <rect x="35" y="673" width="430" height="22" fill="url(#hdr)"/>
    <text x="46" y="689" font-size="12.5" font-weight="bold" fill="#ffffff">Tom's Interests</text>
    <!-- General label cell -->
    <rect x="35" y="695" width="110" height="228" fill="#c6d5ea"/>
    <text x="46" y="716" font-size="12.5" font-weight="bold" fill="#3a5f97">General</text>
    <g font-size="12.5" fill="#333">
      <text x="156" y="716">Internet, being everyone's first</text>
      <text x="156" y="734">friend, Movies, Reading, Karaoke,</text>
      <text x="156" y="752">Language, Culture, History of</text>
      <text x="156" y="770">Communism, Philosophy,</text>
      <text x="156" y="788">Singing/Writing, Music, Running,</text>
      <text x="156" y="806">Finding New Food, Hiking, WWI</text>
      <text x="156" y="824">Aviation, Travel, approving 100</text>
      <text x="156" y="842">million friend requests, clean</text>
      <text x="156" y="860">commit history, Building alternate</text>
      <text x="156" y="878">communities</text>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- ===================== RIGHT COLUMN ========================= -->
  <!-- ============================================================ -->

  <!-- extended network box -->
  <rect x="506" y="56" width="602" height="112" fill="#ffffff" stroke="#333"/>
  <text x="807" y="120" font-size="26" font-weight="bold" fill="#222" text-anchor="middle">Tom is in your extended network</text>

  <!-- Latest Blog Entry -->
  <text x="506" y="202" font-size="15" fill="#333"><tspan font-weight="bold">Tom's Latest Blog Entry</tspan> <tspan fill="#003399">[Subscribe to this Blog]</tspan></text>
  <g font-size="13.5" fill="#333">
    <text x="506" y="240">Welcome to my page!! <tspan fill="#003399">(view more)</tspan></text>
    <text x="506" y="272">Thanks for the add — you didn't add me, I added you <tspan fill="#003399">(view more)</tspan></text>
    <text x="506" y="304">In Stores Today - clean commit history, Vol. 1 ! <tspan fill="#003399">(view more)</tspan></text>
  </g>

  <!-- About orange header -->
  <rect x="506" y="326" width="602" height="22" fill="#fbe2c4" stroke="#e6a95a"/>
  <text x="516" y="342" font-size="12.5" font-weight="bold" fill="#c46a12">About Tom</text>
  <g font-size="13.5" fill="#333">
    <text x="506" y="374">I run the site. I fix the servers. I am your first</text>
    <text x="506" y="394">friend by default and I approve every request</text>
    <text x="506" y="414">personally. There are 100 million of you. Please</text>
    <text x="506" y="434">be patient. :)</text>
  </g>

  <!-- Who I'd Like to Meet orange header -->
  <rect x="506" y="456" width="602" height="22" fill="#fbe2c4" stroke="#e6a95a"/>
  <text x="516" y="472" font-size="12.5" font-weight="bold" fill="#c46a12">Who I'd Like to Meet</text>
  <g font-size="13.5" fill="#333">
    <text x="506" y="504">The one person who still hasn't turned off their</text>
    <text x="506" y="524">profile's autoplay song. Also: anyone who stars</text>
    <text x="506" y="544">this repo. ⭐</text>
  </g>

  <!-- Top friends header -->
  <rect x="506" y="566" width="602" height="24" fill="url(#hdr)"/>
  <text x="516" y="583" font-size="13" font-weight="bold" fill="#ffffff">Tom's Friend Space (Top 8)</text>
  <text x="1050" y="583" font-size="11.5" fill="#dbe8ff">View All</text>

  <!-- top 8 grid: 4 x 2 -->
  <g font-size="11.5" text-anchor="middle" font-weight="bold" fill="#003399">
    <!-- row 1 -->
    <g transform="translate(516,600)"><rect width="132" height="98" fill="#eef3fb" stroke="#9bb8e0"/><circle cx="66" cy="40" r="26" fill="#ffd34d"/><circle cx="57" cy="36" r="3" fill="#333"/><circle cx="75" cy="36" r="3" fill="#333"/><path d="M55 50 q11 8 22 0" stroke="#333" stroke-width="2" fill="none"/><text x="66" y="90">Clippy</text></g>
    <g transform="translate(658,600)"><rect width="132" height="98" fill="#eef3fb" stroke="#9bb8e0"/><rect x="42" y="16" width="48" height="46" rx="8" fill="#5b8a5b"/><circle cx="56" cy="38" r="4" fill="#123"/><circle cx="76" cy="38" r="4" fill="#123"/><text x="66" y="90">Octocat</text></g>
    <g transform="translate(800,600)"><rect width="132" height="98" fill="#eef3fb" stroke="#9bb8e0"/><circle cx="66" cy="40" r="26" fill="#a64d79"/><path d="M50 40 h32 M66 24 v32" stroke="#fff" stroke-width="4"/><text x="66" y="90">DogeCoin</text></g>
    <g transform="translate(942,600)"><rect width="132" height="98" fill="#eef3fb" stroke="#9bb8e0"/><circle cx="66" cy="40" r="26" fill="#3d85c6"/><text x="66" y="47" font-size="24" fill="#fff" font-style="italic">e</text><text x="66" y="90">IE6</text></g>
    <!-- row 2 -->
    <g transform="translate(516,704)"><rect width="132" height="98" fill="#eef3fb" stroke="#9bb8e0"/><rect x="46" y="16" width="40" height="46" fill="#333"/><circle cx="66" cy="40" r="9" fill="#0f0"/><text x="66" y="90">Neo</text></g>
    <g transform="translate(658,704)"><rect width="132" height="98" fill="#eef3fb" stroke="#9bb8e0"/><circle cx="66" cy="40" r="26" fill="#6aa84f"/><path d="M57 30 v20 l17 -10 z" fill="#fff"/><text x="66" y="90">WMPlayer</text></g>
    <g transform="translate(800,704)"><rect width="132" height="98" fill="#eef3fb" stroke="#9bb8e0"/><circle cx="66" cy="40" r="26" fill="#e06666"/><path d="M66 54 l-15 -15 a10.6 10.6 0 0 1 15 -15 a10.6 10.6 0 0 1 15 15 z" fill="#fff"/><text x="66" y="90">xX_Emo_Xx</text></g>
    <g transform="translate(942,704)"><rect width="132" height="98" fill="#fff7d6" stroke="#e6c34a" stroke-width="2"/><circle cx="66" cy="40" r="26" fill="#ffd34d"/><path d="M57 36 h2 M75 36 h2" stroke="#333" stroke-width="3"/><path d="M55 50 q11 8 22 0" stroke="#333" stroke-width="2" fill="none"/><text x="66" y="90" fill="#cc0000">YOU?</text></g>
  </g>

  <!-- comments header -->
  <rect x="506" y="822" width="602" height="24" fill="url(#hdr)"/>
  <text x="516" y="839" font-size="13" font-weight="bold" fill="#ffffff">Tom's Friends Comments</text>
  <g font-size="13" fill="#333">
    <text x="516" y="868"><tspan fill="#003399" font-weight="bold">xX_dev_Xx:</tspan> first!!! nostalgia hit hard lol</text>
    <text x="516" y="892"><tspan fill="#003399" font-weight="bold">glitter_gurl_2003:</tspan> omg the MIDI 😭😭</text>
    <text x="516" y="916"><tspan fill="#003399" font-weight="bold">webmaster:</tspan> thanks for the add :) — Tom</text>
  </g>

  <!-- footer -->
  <text x="570" y="1000" font-size="11" fill="#999" text-anchor="middle">Parody / tribute to MySpace Tom. Not affiliated with MySpace or Mr. Anderson.</text>
</svg>
